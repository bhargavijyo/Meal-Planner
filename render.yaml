services:
  - type: web
    name: ai-meal-planner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # User will need to set this in Render UI

databases:
  - name: recipe-db
    databaseName: recipe_db
    user: user
